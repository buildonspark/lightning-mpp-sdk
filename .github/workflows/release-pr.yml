name: Create Release PR

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: read

jobs:
  create-release-pr:
    name: Create Release PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Bump version
        id: bump
        run: |
          npm version ${{ inputs.bump }} --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        working-directory: sdk

      - name: Update lockfile
        run: npm install --ignore-scripts --package-lock-only
        working-directory: sdk

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: "release: v${{ steps.bump.outputs.version }}"
          branch: release/v${{ steps.bump.outputs.version }}
          title: "release: v${{ steps.bump.outputs.version }}"
          body: |
            Bump `spark-mppx` to v${{ steps.bump.outputs.version }} (${{ inputs.bump }}).

            Once merged, the [publish workflow](${{ github.server_url }}/${{ github.repository }}/actions/workflows/publish.yml) will automatically publish this version to npm with provenance.

            ---

            > **Release notes:** Write your changelog entry below this line. It will be used as the GitHub Release body and prepended to `CHANGELOG.md`.
