name: Publish to npm

on:
  push:
    branches: [main]
    paths: [sdk/package.json]

jobs:
  check-version:
    name: Check version change
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}
      release_notes: ${{ steps.notes.outputs.release_notes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if version changed
        id: check
        run: |
          CURRENT=$(node -p "require('./sdk/package.json').version")
          PREVIOUS=$(git show HEAD~1:sdk/package.json | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version")
          if [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract release notes from merged PR
        if: steps.check.outputs.changed == 'true'
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get PR number from the squash merge commit message
          PR_NUMBER=$(git log -1 --format=%s | grep -oP '#\K\d+' || true)

          NOTES=""
          if [ -n "$PR_NUMBER" ]; then
            # Extract everything below the "---" separator in the PR body
            BODY=$(gh pr view "$PR_NUMBER" --json body --jq .body)
            NOTES=$(echo "$BODY" | sed -n '/^---$/,$ p' | tail -n +2 | sed '/^>[[:space:]]*\*\*Release notes:\*\*/d' | sed -e 's/^[[:space:]]*//' | sed '/./,$!d' | sed -e :a -e '/^[[:space:]]*$/{ $d; N; ba; }')
          fi

          if [ -z "$NOTES" ]; then
            NOTES="Release v${{ steps.check.outputs.version }}"
          fi

          {
            echo "release_notes<<RELEASE_NOTES_EOF"
            echo "$NOTES"
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

  typecheck:
    name: Typecheck
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
        working-directory: sdk
      - run: npx tsc --noEmit
        working-directory: sdk

  test:
    name: Test
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
        working-directory: sdk
      - run: npm test
        working-directory: sdk

  publish:
    name: Publish
    needs: [check-version, typecheck, test]
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    environment: npm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm install
        working-directory: sdk

      - run: npm run build
        working-directory: sdk

      - run: npm publish --provenance --access public
        working-directory: sdk

      - name: Update CHANGELOG.md
        run: |
          VERSION="v${{ needs.check-version.outputs.version }}"
          DATE=$(date +%Y-%m-%d)
          HEADER="## $VERSION ($DATE)"

          ENTRY=$(cat <<'NOTES_EOF'
          ${{ needs.check-version.outputs.release_notes }}
          NOTES_EOF
          )

          if [ -f CHANGELOG.md ]; then
            # Prepend new entry after the first heading line (# Changelog)
            awk -v header="$HEADER" -v entry="$ENTRY" '
              /^# / && !done { print; print ""; print header; print ""; print entry; print ""; done=1; next }
              { print }
            ' CHANGELOG.md > CHANGELOG.tmp && mv CHANGELOG.tmp CHANGELOG.md
          else
            {
              echo "# Changelog"
              echo ""
              echo "$HEADER"
              echo ""
              echo "$ENTRY"
              echo ""
            } > CHANGELOG.md
          fi

      - name: Commit CHANGELOG.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "docs: update CHANGELOG.md for v${{ needs.check-version.outputs.version }}"
          git push

      - name: Create GitHub release
        run: |
          gh release create "v${{ needs.check-version.outputs.version }}" \
            --title "v${{ needs.check-version.outputs.version }}" \
            --notes "$(cat <<'NOTES_EOF'
          ${{ needs.check-version.outputs.release_notes }}
          NOTES_EOF
          )"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
