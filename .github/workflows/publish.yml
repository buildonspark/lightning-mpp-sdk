name: Publish to npm

on:
  push:
    branches: [main]
    paths: [sdk/package.json]

permissions:
  contents: read

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  check-version:
    name: Check version change
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}
      release_notes: ${{ steps.notes.outputs.release_notes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if version changed
        id: check
        run: |
          CURRENT=$(node -p "require('./sdk/package.json').version")
          PREVIOUS=$(git show HEAD~1:sdk/package.json | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version")
          if [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract release notes from merged PR
        if: steps.check.outputs.changed == 'true'
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get PR number from squash merge commit message suffix "(#NNN)"
          PR_NUMBER=$(git log -1 --format=%s | sed -n 's/.*(\#\([0-9]*\)).*/\1/p')

          NOTES=""
          if [ -n "$PR_NUMBER" ]; then
            BODY=$(gh pr view "$PR_NUMBER" --json body --jq .body)
            # Extract everything below the "---" separator, removing the instructions line
            NOTES=$(echo "$BODY" | sed -n '/^---$/,$ p' | tail -n +2 | sed '/^>[[:space:]]*\*\*Release notes:\*\*/d' | sed -e 's/^[[:space:]]*//' | sed '/./,$!d' | sed -e :a -e '/^[[:space:]]*$/{ $d; N; ba; }')
          fi

          if [ -z "$NOTES" ]; then
            # Default to commit log since last tag
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)
            if [ -n "$LAST_TAG" ]; then
              NOTES=$(git log "$LAST_TAG"..HEAD --format="- %s" --no-merges)
            else
              NOTES=$(git log --format="- %s" --no-merges)
            fi
          fi

          DELIMITER=$(openssl rand -hex 16)
          {
            echo "release_notes<<$DELIMITER"
            echo "$NOTES"
            echo "$DELIMITER"
          } >> "$GITHUB_OUTPUT"

  typecheck:
    name: Typecheck
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
        working-directory: sdk
      - run: npx tsc --noEmit
        working-directory: sdk

  test:
    name: Test
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
        working-directory: sdk
      - run: npm test
        working-directory: sdk

  publish:
    name: Publish
    needs: [check-version, typecheck, test]
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: npm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm ci
        working-directory: sdk

      - run: npm run build
        working-directory: sdk

      - name: Check if already published
        id: check-published
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          PUBLISHED=$(npm view "spark-mppx@$VERSION" version 2>/dev/null || true)
          if [ "$PUBLISHED" = "$VERSION" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.check-published.outputs.skip != 'true'
        run: npm publish --provenance --access public
        working-directory: sdk

  release:
    name: Create Release
    needs: [check-version, publish]
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Update CHANGELOG.md
        env:
          RELEASE_NOTES: ${{ needs.check-version.outputs.release_notes }}
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          HEADER="## v$VERSION ($(date +%Y-%m-%d))"
          echo "$RELEASE_NOTES" > /tmp/notes.md

          if [ -f CHANGELOG.md ]; then
            {
              head -1 CHANGELOG.md
              echo ""
              echo "$HEADER"
              echo ""
              cat /tmp/notes.md
              echo ""
              tail -n +2 CHANGELOG.md
            } > CHANGELOG.tmp && mv CHANGELOG.tmp CHANGELOG.md
          else
            {
              echo "# Changelog"
              echo ""
              echo "$HEADER"
              echo ""
              cat /tmp/notes.md
              echo ""
            } > CHANGELOG.md
          fi

      - name: Commit and push CHANGELOG.md
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "docs: update CHANGELOG.md for v$VERSION"
          git push

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_NOTES: ${{ needs.check-version.outputs.release_notes }}
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          echo "$RELEASE_NOTES" > /tmp/notes.md
          gh release create "v$VERSION" --title "v$VERSION" --notes-file /tmp/notes.md
